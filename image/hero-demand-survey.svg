<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">잡아바 러닝센터 온라인교육 수요조사</title>
  <desc id="desc">원하는 강의가 있다면 하루 5번, 2주간 선택 가능하며 가장 많이 선택된 강의를 우선적 수급한다는 안내 이미지</desc>
  <defs>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 H 0 V 24" fill="none" stroke="#ffffff" stroke-opacity=".14" stroke-width="1"/>
    </pattern>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="7" dy="8" stdDeviation="0" flood-color="#152e73" flood-opacity="1"/>
    </filter>
    <filter id="smallShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="4" dy="5" stdDeviation="0" flood-color="#152e73" flood-opacity="1"/>
    </filter>
    <style>
      .font{font-family:"Malgun Gothic","Apple SD Gothic Neo",Arial,sans-serif}
      .navy{fill:#152e73}
      .white{fill:#fff}
      .yellow{fill:#f5ff58}
      .stroke{stroke:#152e73;stroke-width:5;stroke-linejoin:round}
      .titleStroke{stroke:#152e73;stroke-width:9;stroke-linejoin:round;paint-order:stroke fill}
      .bold{font-weight:900}
    </style>
  </defs>

  <rect width="1200" height="520" fill="#169bea"/>
  <rect width="1200" height="520" fill="url(#grid)"/>
  <rect width="1200" height="520" fill="#0b65c8" opacity=".08"/>

  <g transform="translate(104 250) rotate(45)">
    <rect x="-24" y="-4" width="48" height="8" rx="4" class="white stroke"/>
    <rect x="-4" y="-24" width="8" height="48" rx="4" class="white stroke"/>
  </g>
  <g transform="translate(1098 148) rotate(45) scale(.68)">
    <rect x="-24" y="-4" width="48" height="8" rx="4" class="white stroke"/>
    <rect x="-4" y="-24" width="8" height="48" rx="4" class="white stroke"/>
  </g>
  <path d="M93 360 C110 348 110 331 96 318 C116 325 131 318 141 299 C139 323 151 335 174 337 C151 344 142 359 146 382 C133 363 116 359 93 360Z" fill="#fff" stroke="#152e73" stroke-width="4"/>
  <path d="M1004 322 C1020 310 1021 294 1007 281 C1027 288 1042 281 1051 263 C1050 286 1061 299 1083 301 C1061 308 1052 322 1056 344 C1043 327 1027 321 1004 322Z" fill="#fff" stroke="#152e73" stroke-width="4"/>

  <g transform="translate(600 56)" filter="url(#smallShadow)">
    <rect x="-176" y="-21" width="352" height="42" rx="21" class="white stroke"/>
    <text class="font bold navy" x="0" y="7" font-size="23" text-anchor="middle">잡아바 러닝센터 온라인교육 수요조사</text>
  </g>

  <g transform="translate(248 174) rotate(-15)">
    <rect x="-73" y="-32" width="146" height="64" rx="32" fill="#ffd7ee" stroke="#152e73" stroke-width="4"/>
    <text class="font bold" x="0" y="9" fill="#2453ba" font-size="29" text-anchor="middle">PICK</text>
  </g>
  <g transform="translate(879 240) rotate(-8)">
    <rect x="-78" y="-32" width="156" height="64" rx="32" fill="#f5ff58" stroke="#152e73" stroke-width="4"/>
    <text class="font bold" x="0" y="9" fill="#2453ba" font-size="29" text-anchor="middle">CLASS</text>
  </g>
  <g transform="translate(265 313) rotate(-10)">
    <path d="M-62 -40 L-47 -25 L-24 -36 L-14 -14 L10 -24 L17 0 L42 -2 L31 20 L51 36 L24 39 L14 62 L-5 44 L-29 54 L-31 28 L-55 22 L-39 3 Z" fill="#fff" stroke="#152e73" stroke-width="4"/>
    <text class="font bold" x="0" y="16" fill="#2453ba" font-size="30" text-anchor="middle">5X</text>
  </g>

  <g class="font bold" text-anchor="middle" transform="translate(600 225) rotate(-4)">
    <polygon points="-326 -102 244 -136 290 -88 -284 -54" fill="#152e73"/>
    <polygon points="-352 -38 309 -78 351 20 -312 60" fill="#152e73"/>
    <text x="-20" y="-70" font-size="68" class="white titleStroke">원하는 강의가</text>
    <text x="0" y="33" font-size="106" class="yellow titleStroke">있다면 !</text>
  </g>

  <g transform="translate(600 327)" filter="url(#smallShadow)">
    <rect x="-242" y="-31" width="484" height="62" rx="31" class="white stroke"/>
    <text class="font bold navy" x="0" y="11" font-size="31" text-anchor="middle">하루 5번, 2주간 선택 가능!</text>
  </g>

  <text class="font bold white" x="600" y="412" font-size="30" text-anchor="middle">듣고 싶은 온라인교육을 선택해주세요.</text>
  <text class="font bold yellow" x="600" y="457" font-size="34" text-anchor="middle">가장 많이 선택된 강의를 우선적 수급합니다.</text>
</svg>
