<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>잡아바 러닝센터 2차수급 수요조사</title>
<link rel="stylesheet" href="css/edu-event.css" />
</head>
<body>
<div id="jbb-app">
  <div class="jbb-header">
    <img class="jbb-hero-img" src="image/hero-demand-survey-foreground-v3.png" alt="잡아바 러닝센터 온라인교육 수요조사. 원하는 강의가 있다면 하루 1번, 5개 강의. 2주간 선택 가능! 가장 많이 선택된 강의를 우선적으로 제공합니다.">
  </div>

  <div class="jbb-qstrip">
    <div class="jbb-qcard">
      <div class="jbb-qleft">
        <div class="jbb-dots" id="jbb-dots"></div>
        <div class="jbb-qtext">오늘 남은 선택 <b id="jbb-remainNum">5</b> / 5</div>
      </div>
    </div>
  </div>

  <div class="jbb-wrap">
    <div class="jbb-tabs" id="jbb-tabs"></div>
    <div id="jbb-panels"></div>
    <section class="jbb-resultSection" id="jbb-resultSection" hidden></section>
    <div class="jbb-notice">
      가장 많이 선택된 강의를 <b>우선적 수급</b>합니다. 사정에 따라 일부 강의는 수급이 어려울 수 있습니다.
    </div>
  </div>

  <div class="jbb-foot">
    <div class="jbb-inner">
      <div class="jbb-info">
        오늘 선택 <span class="jbb-big jbb-today"><span id="jbb-footToday">0</span>/5</span>
        &nbsp;·&nbsp; 내 누적 선택 <span class="jbb-big jbb-total" id="jbb-footTotal">0</span>개
      </div>
      <div class="jbb-footbtns">
        <button class="jbb-btn jbb-btn-p" id="jbb-submitBtn" disabled>선택완료 (0/5)</button>
        <button class="jbb-btn jbb-btn-o" id="jbb-goResult">📊 결과 보기</button>
      </div>
    </div>
  </div>

  <div class="jbb-toast" id="jbb-toast"></div>

  <div class="jbb-resultModalOverlay" id="jbb-resultModal" aria-hidden="true">
    <div class="jbb-resultModal" role="dialog" aria-modal="true" aria-labelledby="jbb-resultModalTitle">
      <div class="jbb-resultModalHead">
        <h2 class="jbb-resTitle" id="jbb-resultModalTitle">조사현황</h2>
        <button class="jbb-modalClose" id="jbb-resultModalClose" type="button" aria-label="조사현황 닫기">×</button>
      </div>
      <div class="jbb-resultModalBody" id="jbb-resultBody"></div>
    </div>
  </div>

  <div class="jbb-overlay" id="jbb-overlay">
    <div class="jbb-sticker">
      <div class="jbb-badge">🎉</div>
      <h2>오늘 선택 완료!</h2>
      <p>오늘 선택은 완료되었습니다.<br>내일 5번의 기회가 또 생깁니다.</p>
      <button class="jbb-btn jbb-btn-o" id="jbb-stickerClose">확인</button>
    </div>
  </div>

  <div class="jbb-overlay" id="jbb-limitOverlay">
    <div class="jbb-sticker">
      <div class="jbb-badge">✋</div>
      <h2>선택은 5개까지</h2>
      <p>하루 최대 5개까지 선택할 수 있습니다.<br>완료하려면 '선택완료'를 눌러주세요.</p>
      <button class="jbb-btn jbb-btn-o" id="jbb-limitClose">확인</button>
    </div>
  </div>
</div>

<script src="js/edu-event.js"></script>
</body>
</html>
